version: '3.9'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-learn_mvp}
      POSTGRES_USER: ${POSTGRES_USER:-learn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-learn}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-learn} -d ${POSTGRES_DB:-learn_mvp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
      - ./scripts:/scripts
    command: bash -lc "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  web:
    build:
      context: ./apps/web
    env_file: .env
    depends_on:
      - api
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    command: npm run dev -- --hostname 0.0.0.0 --port 3000

volumes:
  pgdata:
